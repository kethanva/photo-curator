# Photo Curator Configuration
# All paths are relative to the photo_curator/ directory

paths:
  input:  "data/input_photos"
  output: "data/output_photos"
  cache:  "cache/photo_db.sqlite"
  models: "models"

# ── Vector Store (ChromaDB — local HNSW, no server required) ────────────────
# Stores CLIP and FaceNet embeddings for O(log N) ANN search.
# Scales to 1M+ photos without loading all embeddings into RAM.
vector_store:
  path:             "cache/vector_store"   # persisted to disk automatically
  clip_collection:  "clip_embeddings"
  face_collection:  "face_embeddings"

ingestion:
  supported_extensions: [".jpg", ".jpeg", ".png", ".heic", ".heif", ".tiff", ".bmp", ".webp"]
  max_dimension: 1024       # resize to this before processing (memory / speed)
  batch_size: 16

quality:
  min_blur_score: 50.0      # Laplacian variance — below this = blurry
  min_exposure_score: 0.15  # mean brightness 0–1
  max_exposure_score: 0.90
  min_resolution: 640       # shorter side in pixels

deduplication:
  phash_threshold: 10        # Hamming distance — slightly looser to catch more burst-shot pairs
  embedding_similarity: 0.92 # cosine similarity floor — was 0.95; lower catches semantic near-dupes
  # Perceptual-hash algorithm: phash (DCT, default) | dhash (gradient) |
  # ahash (average) | whash (wavelet, needs PyWavelets). Applied at ingest.
  hash_algorithm: phash
  # Dual-hash confirmation gate — require a SECOND independent hash algorithm to
  # also agree before grouping a pHash near-duplicate. Cuts false positives at
  # the cost of one extra stored hash per photo. Changing these needs a re-ingest
  # (or at least re-running stage_extract) so phash2 is populated.
  dual_hash:
    enabled: false
    secondary: dhash         # second algorithm (must differ from hash_algorithm)
    secondary_threshold: 8   # max Hamming distance for the secondary confirmation
  # Burst-shot dedup — group photos shot within gap_seconds (EXIF timestamp)
  # and keep only the sharpest. Independent of the pHash/CLIP pass.
  burst:
    enabled: true
    gap_seconds: 3.0

privacy:
  filter_screenshots: true
  filter_documents: true      # CLIP zero-shot doc / ID / meme / text-overlay detection
  filter_text_heavy: true     # binary CLIP check for chat screenshots / text-only images saved with camera filenames
  filter_boring_objects: true # filter out mundane photos like tubelights, doors, windows, walls
  mundane_object_threshold: 0.62 # binary CLIP threshold for mundane-object detector (lower = stricter)
  filter_intimate_content: true # filter out intimate or highly private photos of people
  # Accidental close-up gate: flesh-tone pixels fill the frame AND the photo is
  # blurry → camera fired against a hand/skin. Pure-image, no model.
  filter_accidental_closeup: true
  min_flesh_fraction: 0.65       # min flesh-tone pixel fraction to consider (0–1)
  max_accidental_blur_score: 120.0 # Laplacian variance at/below which a flesh-heavy frame is junk
  # Pitch-black / pure-white frames (lens cap, pocket misfire, blown flash):
  # extreme mean brightness AND near-zero tonal detail. Hard exclusion —
  # plain exposure failures stay salvageable in selection, these do not.
  filter_pitch_black: true
  filter_home_private: false  # enable to filter solo shots at home
  home_coords: null           # [lat, lon] or null
  home_radius_km: 0.5
  # Reshared / forwarded content filter (filename-based, free and fast)
  filter_reshared: true
  # Leaf filename prefixes (case-insensitive) treated as forwarded content.
  # Leave commented to use built-in defaults: FB_IMG_, IMG-WA, WhatsApp,
  # received_, Screenshot, Screen Shot, insta_, twitter_, tweet_, telegram_,
  # viber image, signal-.
  # reshared_prefixes: ["fb_img_", "img-wa", "whatsapp", "screenshot"]

clustering:
  time_weight: 1.0
  gps_weight: 2.0
  visual_weight: 1.5
  eps: 3.0
  min_samples: 2

# ── Aesthetic Scoring ───────────────────────────────────────────────────────
aesthetic:
  use_laion_predictor: false  # true = download LAION MLP. NOTE: the published
                               # weights target CLIP ViT-L/14 (768-dim) and are
                               # incompatible with this pipeline's ViT-B/32
                               # embeddings — the loader detects this and falls
                               # back to CLIP zero-shot with a warning.
                               # false = CLIP zero-shot proxy (instant, offline)

# ── Scene Tagging ───────────────────────────────────────────────────────────
scene_tagging:
  enabled: true
  top_n: 3              # number of scene labels to store per photo

# ── Facial Sentiment ────────────────────────────────────────────────────────
sentiment:
  enabled: true
  min_face_for_sentiment: 1  # only run on photos with ≥ N faces

# ── Ranking weights ──────────────────────────────────────────────────────────
# Weights sum to 1.0 for interpretability but are not required to.
# Face-related signals (face_score + face_prominence + face_confidence + sentiment)
# total 0.61 — photos with clear, smiling, prominent faces rank highest.
# Aesthetic weight reduced 0.20 → 0.05: empirically the CLIP zero-shot
# aesthetic proxy has almost no dynamic range (whole-library spread ~0.49–0.51),
# so min-max normalisation was amplifying noise into 20% of the score.
# Redistributed to sharpness/face/sentiment, which carry real signal.
ranking:
  weights:
    sharpness:           0.15
    aesthetic:           0.05   # CLIP zero-shot proxy — weak signal, low weight
    face_score:          0.23   # log-scaled face count
    face_prominence:     0.10   # face bounding-box area / image area
    face_confidence:     0.05   # MTCNN detection probability
    sentiment:           0.23   # smile + eyes open (MediaPipe)
    uniqueness:          0.10
    metadata_importance: 0.05
    diversity_bonus:     0.04

# ── Face identity clustering ─────────────────────────────────────────────────
# Tighter eps (0.65 vs default 0.80) reduces false merging of different people.
# Lower frequent_person_threshold (3 vs default 5) identifies recurring people
# even in smaller libraries.
face_clustering:
  enabled: true
  eps: 0.65                    # DBSCAN radius — smaller = stricter identity match
  min_samples: 2               # min photos to form an identity cluster
  frequent_person_threshold: 3 # min photos for a person to be "frequent"

# ── Selection — output budget + diversity strategy ───────────────────────────
selection:
  # Output budget mode — choose one:
  #   percentage  → select output_percentage of all eligible photos
  #   bytes       → fill up to max_output_bytes (1 GB default)
  # Both modes still apply the byte cap as a hard upper limit.
  output_mode: percentage       # 'percentage' or 'bytes'
  output_percentage: 0.20       # 20 % of ALL scanned input photos (incl. those
                                # later excluded as private/duplicate/blurry);
                                # capped at the eligible candidate count
  max_output_bytes: 1_073_741_824   # 1 GB hard cap (always enforced)

  # Bucket fractions (auto-normalised to sum to 1.0)
  # Built-in types: people (face clusters), location (GPS clusters), aesthetic (catch-all)
  # Any other name is a CLIP subject bucket — uses built-in presets from subject_priority.py.
  # Available presets: human, family, kids, friends, bike, motorbike, skateboard,
  #   scooter, landscape, nature, hiking, beach, camping, snow, water, flowers,
  #   street, architecture, night, market, cafe, food, drinks, celebration,
  #   concert, festival, sports, gym, running, yoga, football, basketball,
  #   swimming, travel, cars, trains, planes, boats, pets, wildlife, birds,
  #   fashion, art, music, reading, gaming
  # To add a new subject bucket, just add a line — no code changes needed.
  buckets:
    people:     0.50    # best photos per frequent person (boosted — face-first)
    location:   0.20    # best photos per GPS cluster (reduced to limit same-place repetition)
    bike:       0.10    # CLIP-matched cycling/bicycle photos
    landscape:  0.05    # CLIP-matched scenic landscape photos (reduced)
    aesthetic:  0.15    # catch-all: highest overall scores

  # Per-bucket caps — fraction of the output target (0.0 – 1.0)
  # Example: 20 output photos → 0.15 = 3, 0.06 = 1-2
  max_per_person_pct:   0.20   # max share of output for any single identified person
  max_per_location_pct: 0.15   # max share from any single GPS/event cluster
  max_per_cluster_pct:  0.08   # event-cluster cap — tighter to prevent same-event pileup
  max_per_day_pct:      0.15   # NEW: max share from any single calendar day (strongest temporal guard)
                               # e.g. 20-photo output → max 3 photos per shooting day
  max_per_hour_pct:     0.05   # max share from any single calendar hour
  max_dynamic_spacing:  600    # upper limit for dynamic temporal spacing (seconds)
  global_min_gap_seconds: 60   # hard floor between any two selected photos
                               # regardless of cluster/event grouping. Catches
                               # burst shots (e.g. IMG_*_102752 / 102755) that
                               # land in DBSCAN noise or split across clusters.
                               # 0 disables.
  min_score_pct:        0.15   # drop bottom 15% of photos by composite score
  # Minimum candidate pool size as a fraction of total scanned photos.
  # If the strict (quality_pass=1) pool is smaller than this floor, the
  # best-scored quality_pass=0 photos are admitted to pad it. Prevents
  # aggressive blur/exposure thresholds from starving the output on
  # libraries with many soft-focus or underexposed shots. 0.0 disables
  # the pad (strict filter only). Default 0.40 ≈ 40% of input photos.
  min_pool_fraction:    0.40

  # Output resizing — dramatically increases photos that fit in budget
  resize_output:       true
  output_long_side:    2560   # pixels — good for 2K/4K displays
  output_jpeg_quality: 92     # 85–95 recommended

output:
  copy_files: true
  generate_report: true
  report_filename: "output.json"
