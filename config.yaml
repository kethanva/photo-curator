# Photo Curator Configuration
# All paths are relative to the photo_curator/ directory

paths:
  input:  "data/input_photos"
  output: "data/output_photos"
  cache:  "cache/photo_db.sqlite"
  models: "models"

# ── Vector Store (ChromaDB — local HNSW, no server required) ────────────────
# Stores CLIP and FaceNet embeddings for O(log N) ANN search.
# Scales to 1M+ photos without loading all embeddings into RAM.
vector_store:
  path:             "cache/vector_store"   # persisted to disk automatically
  clip_collection:  "clip_embeddings"
  face_collection:  "face_embeddings"

ingestion:
  supported_extensions: [".jpg", ".jpeg", ".png", ".heic", ".heif", ".tiff", ".bmp", ".webp"]
  max_dimension: 1024       # resize to this before processing (memory / speed)
  batch_size: 16

quality:
  min_blur_score: 50.0      # Laplacian variance — below this = blurry
  min_exposure_score: 0.15  # mean brightness 0–1
  max_exposure_score: 0.90
  min_resolution: 640       # shorter side in pixels

deduplication:
  phash_threshold: 16        # Hamming distance (0 = exact, 16 = similar framing)
  embedding_similarity: 0.80  # cosine similarity floor (0.80 = same subject, different angle)

privacy:
  filter_screenshots: true
  filter_documents: true      # CLIP zero-shot doc / ID / meme / text-overlay detection
  filter_text_heavy: true     # binary CLIP check for chat screenshots / text-only images saved with camera filenames
  filter_home_private: false  # enable to filter solo shots at home
  home_coords: null           # [lat, lon] or null
  home_radius_km: 0.5
  # Reshared / forwarded content filter (filename-based, free and fast)
  filter_reshared: true
  # Leaf filename prefixes (case-insensitive) treated as forwarded content.
  # Leave commented to use built-in defaults: FB_IMG_, IMG-WA, WhatsApp,
  # received_, Screenshot, Screen Shot, insta_, twitter_, tweet_, telegram_,
  # viber image, signal-.
  # reshared_prefixes: ["fb_img_", "img-wa", "whatsapp", "screenshot"]

clustering:
  time_weight: 1.0
  gps_weight: 2.0
  visual_weight: 1.5
  eps: 0.6
  min_samples: 2

# ── Aesthetic Scoring ───────────────────────────────────────────────────────
aesthetic:
  use_laion_predictor: false  # true = download LAION MLP (more accurate)
                               # false = CLIP zero-shot proxy (instant, offline)

# ── Scene Tagging ───────────────────────────────────────────────────────────
scene_tagging:
  enabled: true
  top_n: 3              # number of scene labels to store per photo

# ── Facial Sentiment ────────────────────────────────────────────────────────
sentiment:
  enabled: true
  min_face_for_sentiment: 1  # only run on photos with ≥ N faces

# ── Ranking weights ──────────────────────────────────────────────────────────
# Base weights do not need to sum to 1.0.
ranking:
  weights:
    sharpness:           0.15
    aesthetic:           0.35   # CLIP / LAION aesthetic score — primary signal
    face_score:          0.15
    sentiment:           0.15   # smile + eyes open (MediaPipe)
    uniqueness:          0.12
    metadata_importance: 0.05
    diversity_bonus:     0.03

# ── Selection — output budget + 30 / 30 / 40 diversity strategy ─────────────
selection:
  # Output budget mode — choose one:
  #   percentage  → select output_percentage of all eligible photos
  #   bytes       → fill up to max_output_bytes (1 GB default)
  # Both modes still apply the byte cap as a hard upper limit.
  output_mode: percentage       # 'percentage' or 'bytes'
  output_percentage: 0.20       # 20 % of eligible photos (output_mode=percentage)
  max_output_bytes: 1_073_741_824   # 1 GB hard cap (always enforced)

  # Bucket fractions (auto-normalised to sum to 1.0)
  # Built-in types: people (face clusters), location (GPS clusters), aesthetic (catch-all)
  # Any other name is a CLIP subject bucket — uses built-in presets from subject_priority.py.
  # Available presets: human, family, kids, friends, bike, motorbike, skateboard,
  #   scooter, landscape, nature, hiking, beach, camping, snow, water, flowers,
  #   street, architecture, night, market, cafe, food, drinks, celebration,
  #   concert, festival, sports, gym, running, yoga, football, basketball,
  #   swimming, travel, cars, trains, planes, boats, pets, wildlife, birds,
  #   fashion, art, music, reading, gaming
  # To add a new subject bucket, just add a line — no code changes needed.
  buckets:
    people:     0.40    # best photos per frequent person
    location:   0.30    # best photos per GPS cluster
    bike:       0.10    # CLIP-matched cycling/bicycle photos
    landscape:  0.10    # CLIP-matched scenic landscape photos
    aesthetic:  0.10    # catch-all: highest overall scores

  # Per-bucket caps — fraction of the output target (0.0 – 1.0)
  # Example: 50 output photos → 0.10 = 5, 0.30 = 15, 0.20 = 10
  max_per_person_pct:   0.25   # max share of output for any single identified person
  max_per_location_pct: 0.25   # max share of output from any single GPS cluster
  max_per_cluster_pct:  0.12   # event-cluster cap (backup diversity guard)
  max_per_hour_pct:     0.05   # max share from any single calendar hour (temporal spread)
  min_score_pct:        0.15   # drop bottom 15% of photos by composite score

  # Output resizing — dramatically increases photos that fit in budget
  resize_output:       true
  output_long_side:    2560   # pixels — good for 2K/4K displays
  output_jpeg_quality: 92     # 85–95 recommended

output:
  copy_files: true
  generate_report: true
  report_filename: "output.json"
